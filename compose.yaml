# Media Server Docker Services

name: media-server
services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    extends:
      file: hwaccel.transcoding.yml
      service: quicksync
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
      - ${EXTERNAL_LIB}:/usr/src/app/external
    env_file:
      - .env
    ports:
      - 2283:2283
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-openvino
    extends:
      file: hwaccel.ml.yml
      service: openvino
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false
  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CLI_ARGS=
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY}
      - DUPLICATI__WEBSERVICE_PASSWORD=${DUPLICATI__WEBSERVICE_PASSWORD}
    volumes:
      - ./data/duplicati/config:/config
      - ./data/duplicati/backups:/backups
      - ./data/duplicati/source:/source
      - ${EXTERNAL_LIB}:/immich/external
      - ${UPLOAD_LOCATION}:/immich/uploads
    ports:
      - 8200:8200
    restart: unless-stopped
  plex:
    image: plexinc/pms-docker:${PLEX_VERSION:-latest}
    container_name: plex
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Vancouver
      - PLEX_CLAIM=${PLEX_CLAIM_TOKEN}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/plexmediaserver:/config
      - ./data/ssl:/data/plex-ssl
      - ${PLEX_EXT_LIB}:/data/TV
    restart: unless-stopped
    network_mode: host
  nginx:
    image: nginx:${NGINX_VERSION:-latest}
    container_name: nginx
    ports:
      - 80:80
      - 443:443
    restart: always
    volumes:
      - ./data/immich.conf:/etc/nginx/conf.d/immich.conf
      - ./data/ssl:/etc/nginx/ssl
    depends_on:
      - immich-server
volumes:
  model-cache: null
networks: {}
